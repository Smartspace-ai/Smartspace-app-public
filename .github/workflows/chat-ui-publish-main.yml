name: chat-ui publish (main channel)

on:
  push:
    branches: [main]
    paths:
      - 'packages/chat-ui/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/chat-ui-publish-main.yml'

permissions:
  contents: read

concurrency:
  group: chat-ui-publish-main
  cancel-in-progress: false

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute main version
        id: ver
        run: |
          BASE_TAG=$(git describe --tags --match='v*' --abbrev=0 2>/dev/null || echo 'v0.0.0')
          BASE="${BASE_TAG#v}"
          echo "version=${BASE}-main.${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  publish:
    needs: compute-version
    uses: ./.github/workflows/_chat-ui-publish-core.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      tag: main

  notify:
    needs: [compute-version, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Generate CI_DISPATCH_APP token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CI_DISPATCH_APP_PRIVATE_KEY }}
          owner: Smartspace-ai
          repositories: Smartspace-app

      - name: Notify Smartspace-app
        run: |
          gh api repos/Smartspace-ai/Smartspace-app/dispatches \
            --method POST \
            -f event_type=chat-ui-published \
            -f "client_payload[tag]=main" \
            -f "client_payload[version]=${{ needs.compute-version.outputs.version }}" \
            -f "client_payload[target_branch]=main"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Summary
        run: |
          echo "Published \`@smartspace/chat-ui@${{ needs.compute-version.outputs.version }}\` (dist-tag \`main\`)" >> "$GITHUB_STEP_SUMMARY"
