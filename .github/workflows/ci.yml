name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quality check
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.20.3"
          verb: call
          module: ./ci
          args: >-
            quality-check
            --source=.
