# Reusable: called by chat-ui-publish-{develop,pr,main,release}.yml
# This is the single file registered as a trusted publisher on npmjs.org
# for @smartspace/chat-ui — OIDC identity is scoped to this workflow.

name: _chat-ui-publish-core

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # OIDC trusted publishing for @smartspace/chat-ui

jobs:
  publish:
    if: github.repository == 'Smartspace-ai/Smartspace-app-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Stamp version into package.json
        run: |
          cd packages/chat-ui
          jq --arg v "${{ inputs.version }}" '.version = $v' package.json > p.json
          mv p.json package.json

      - run: pnpm --filter @smartspace/chat-ui build

      - name: Publish to npmjs.com
        run: |
          cd packages/chat-ui
          pnpm publish --tag ${{ inputs.tag }} --access public --no-git-checks --provenance
