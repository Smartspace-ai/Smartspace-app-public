# Smartspace-internal: safe to delete in forks.
# Notifies the Smartspace-ai/Smartspace-app repo that this repo's develop branch
# has updated, so it can rebuild its Docker image with the latest public UI.

name: Notify Smartspace-app (internal)

on:
  push:
    branches: [develop]

concurrency:
  group: internal-notify-app
  cancel-in-progress: false

jobs:
  notify:
    # Skip on customer forks — the dispatch target Smartspace-ai/Smartspace-app
    # is internal-only and the fork's GITHUB_TOKEN can't reach it.
    if: github.repository == 'Smartspace-ai/Smartspace-app-public'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_DISPATCH_APP_ID }}
          private-key: ${{ secrets.CI_DISPATCH_APP_PRIVATE_KEY }}
          owner: Smartspace-ai
          repositories: Smartspace-app

      - name: Trigger Smartspace-app Docker build
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: Smartspace-ai/Smartspace-app
          event-type: app-public-updated
