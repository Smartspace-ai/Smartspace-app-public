name: Deploy static site to Azure Storage

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: smartspace

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Check that AZURE_STORAGE_CONNECTION_STRING secret exists
        run: |
          if [ -z "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" ]; then
            echo "::error::AZURE_STORAGE_CONNECTION_STRING secret is not set!"
            exit 1
          fi

      - name: Check .env for required variables
        run: |
          required_vars=(
            VITE_CLIENT_ID
            VITE_CLIENT_AUTHORITY
            VITE_CLIENT_SCOPES
            VITE_CHAT_API_URI
            VITE_TEAMS_USE_MSAL
          )
          for var in "${required_vars[@]}"; do
            if ! grep -q "^$var=" .env; then
              echo "::error::.env does not contain $var!"
              exit 1
            fi
            value=$(grep "^$var=" .env | cut -d'=' -f2-)
            if [ -z "$value" ]; then
              echo "::error::$var in .env is empty!"
              exit 1
            fi
          done

      - name: Install
        run: npm ci

      - name: Reset Nx cache
        run: npx nx reset

      - name: Build
        run: npm run build

      - name: Deploy to Azure Storage
        uses: azure/CLI@v2
        with:
          azcliversion: 2.67.0
          inlineScript: |
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --source ./dist/smartspace \
              --destination '$web' \
              --overwrite true
