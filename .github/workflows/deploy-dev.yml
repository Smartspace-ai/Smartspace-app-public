name: Deploy to dev

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env for required variables
        run: |
          required_vars=(
            VITE_CLIENT_ID
            VITE_CLIENT_AUTHORITY
            VITE_CLIENT_SCOPES
            VITE_CHAT_API_URI
            VITE_TEAMS_USE_MSAL
          )
          for var in "${required_vars[@]}"; do
            if ! grep -q "^$var=" .env; then
              echo "::error::.env does not contain $var!"
              exit 1
            fi
            value=$(grep "^$var=" .env | cut -d'=' -f2-)
            if [ -z "$value" ]; then
              echo "::error::$var in .env is empty!"
              exit 1
            fi
          done

      - name: Build
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.20.3"
          verb: call
          module: ./ci
          args: >-
            build
            --source=.
            --gh-package-token=env:GH_PACKAGE_TOKEN
            export --path=./dist/smartspace
        env:
          GH_PACKAGE_TOKEN: ${{ secrets.GH_PACKAGE_TOKEN }}

      - name: Deploy to Azure Storage
        uses: azure/CLI@v2
        with:
          azcliversion: 2.67.0
          inlineScript: |
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --source ./dist/smartspace \
              --destination '$web' \
              --overwrite true
