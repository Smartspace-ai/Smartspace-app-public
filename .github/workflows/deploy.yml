name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: GitHub environment name (dev or production)

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env from environment
        run: |
          {
            echo "VITE_CLIENT_ID=${{ vars.VITE_CLIENT_ID }}"
            echo "VITE_CLIENT_AUTHORITY=${{ vars.VITE_CLIENT_AUTHORITY }}"
            echo "VITE_CLIENT_SCOPES=${{ vars.VITE_CLIENT_SCOPES }}"
            echo "VITE_CHAT_API_URI=${{ vars.VITE_CHAT_API_URI }}"
            echo "VITE_TEAMS_USE_MSAL=${{ vars.VITE_TEAMS_USE_MSAL }}"
          } > .env

      - name: Validate .env
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.20.3"
          verb: call
          module: ./ci
          args: >-
            check-env
            --source=.

      - name: Build
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.20.3"
          verb: call
          module: ./ci
          args: >-
            build
            --source=.
            export --path=./dist/smartspace

      - name: Deploy to Azure Storage
        uses: azure/CLI@v2
        with:
          azcliversion: 2.67.0
          inlineScript: |
            # Upload the whole build with no-cache so returning users always
            # revalidate index.html and pick up the latest asset references.
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --source ./dist/smartspace \
              --destination '$web' \
              --content-cache-control 'no-cache, max-age=0, must-revalidate' \
              --overwrite true

            # Re-upload hashed bundles with long-lived immutable cache.
            # Vite emits content hashes in these filenames, so cached copies never go stale.
            az storage blob upload-batch \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --source ./dist/smartspace/assets \
              --destination '$web/assets' \
              --content-cache-control 'public, max-age=31536000, immutable' \
              --overwrite true

      # Optional: purge CDN / Front Door in front of the storage account.
      # These steps no-op unless the environment sets CDN_TYPE to "cdn" or "afd"
      # and provides AZURE_CREDENTIALS for the az login step.
      - name: Azure login (for CDN purge)
        if: vars.CDN_TYPE == 'cdn' || vars.CDN_TYPE == 'afd'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Purge Azure CDN
        if: vars.CDN_TYPE == 'cdn'
        uses: azure/CLI@v2
        with:
          azcliversion: 2.67.0
          inlineScript: |
            az cdn endpoint purge \
              --resource-group "${{ vars.CDN_RESOURCE_GROUP }}" \
              --profile-name "${{ vars.CDN_PROFILE_NAME }}" \
              --name "${{ vars.CDN_ENDPOINT_NAME }}" \
              --content-paths '/*' \
              --no-wait

      - name: Purge Azure Front Door
        if: vars.CDN_TYPE == 'afd'
        uses: azure/CLI@v2
        with:
          azcliversion: 2.67.0
          inlineScript: |
            az afd endpoint purge \
              --resource-group "${{ vars.AFD_RESOURCE_GROUP }}" \
              --profile-name "${{ vars.AFD_PROFILE_NAME }}" \
              --endpoint-name "${{ vars.AFD_ENDPOINT_NAME }}" \
              --content-paths '/*' \
              --domains "${{ vars.AFD_DOMAIN }}" \
              --no-wait
