version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Pacific/Auckland
    target-branch: develop
    open-pull-requests-limit: 3
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-*"
          - "@types/react"
          - "@types/react-dom"
      tanstack:
        patterns:
          - "@tanstack/*"
      milkdown:
        patterns:
          - "@milkdown/*"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      azure-msal:
        patterns:
          - "@azure/*"
          - "@microsoft/*"
      nx:
        patterns:
          - "nx"
          - "@nx/*"
          - "@swc/*"
          - "@swc-node/*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Catch-all — MUST stay last. Dependabot assigns each dependency to the
      # first group it matches, so the specific groups above win and this bundles
      # every remaining npm update into ONE weekly PR instead of per-package PRs.
      other:
        patterns:
          - "*"
    labels:
      - dependencies
      - npm

  - package-ecosystem: npm
    directory: "/packages/chat-ui"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Pacific/Auckland
    target-branch: develop
    open-pull-requests-limit: 3
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-*"
          - "@types/react"
          - "@types/react-dom"
      # Catch-all — MUST stay last; bundles every remaining npm update into ONE PR.
      other:
        patterns:
          - "*"
    labels:
      - dependencies
      - npm

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Pacific/Auckland
    target-branch: develop
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
